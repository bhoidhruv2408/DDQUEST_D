<body>
    <!-- 3D Space Canvas -->
    <canvas id="spaceCanvas"></canvas>
    <div class="toast-container" id="toastContainer"></div>

    <div class="syllabus-container">
        <!-- Header -->
        <div class="syllabus-header">
            <div class="container">
                <div class="header-content">
                    <div class="navigation-buttons">
                        <a href="index.html" class="back-btn">
                            <i class="fas fa-arrow-left"></i> Semester 1
                        </a>
                        <button onclick="logoutUser()" class="logout-btn">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </div>

                    <div class="welcome-message">
                        <h1><span id="greeting">Hello</span>, <span id="userName">Student</span>!</h1>
                        <p>Semester 1 – Syllabus</p>
                    </div>

                    <!-- Current Time & Date -->
                    <div class="time-display">
                        <i class="far fa-clock"></i>
                        <span id="currentTime"></span> • <span id="currentDate"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Syllabus Content -->
        <div class="container">
            <h2 class="section-title">Syllabus</h2>
            <div class="syllabus-grid" id="syllabusGrid">
                <div class="loader"></div>
            </div>
        </div>
    </div>

    <!-- View Modal (reuse from materials) -->
    <div class="modal" id="viewModal">
        <div class="modal-card">
            <div class="view-modal-header">
                <h2 id="viewModalTitle"><i class="fas fa-eye"></i> View Syllabus</h2>
                <div class="view-controls">
                    <button id="viewReloadBtn" title="Reload"><i class="fas fa-sync-alt"></i></button>
                    <a href="#" id="viewDirectLink" target="_blank" title="Open in new tab"><i class="fas fa-external-link-alt"></i></a>
                    <button class="close-btn" onclick="closeViewModal()"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div class="view-modal-body">
                <div class="iframe-loader" id="iframeLoader">
                    <div class="spinner"></div>
                    <span>Loading document...</span>
                </div>
                <iframe id="viewFrame" class="view-frame" src="about:blank" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="syllabus.js"></script>
