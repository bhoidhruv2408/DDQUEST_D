<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDQuest · View Material</title>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS (reuse materials.css or create a new one) -->
    <link rel="stylesheet" href="view-material.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <!-- Firebase Initialization -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCRWujKbVhlEpvygCBObMfkb7tp96Kiu4w",
            authDomain: "ddquest-614ea.firebaseapp.com",
            databaseURL: "https://ddquest-614ea-default-rtdb.firebaseio.com",
            projectId: "ddquest-614ea",
            storageBucket: "ddquest-614ea.appspot.com",
            messagingSenderId: "602140742747",
            appId: "1:602140742747:web:1cbd274462578fde845b7e",
            measurementId: "G-1CRQVW0WF9"
        };
        firebase.initializeApp(firebaseConfig);
    </script>
</head>
<body>
    <!-- 3D Space Canvas -->
    <canvas id="spaceCanvas"></canvas>
    <div class="toast-container" id="toastContainer"></div>

    <div class="viewer-container">
        <!-- Header -->
        <div class="viewer-header">
            <div class="container">
                <div class="header-content">
                    <div class="navigation-buttons">
                        <a href="javascript:history.back()" class="back-btn">
                            <i class="fas fa-arrow-left"></i> Back
                        </a>
                        <button onclick="logoutUser()" class="logout-btn">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </div>

                    <div class="welcome-message">
                        <h1><span id="greeting">Hello</span>, <span id="userName">Student</span>!</h1>
                        <p id="materialTitle">Loading material...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Viewer Content -->
        <div class="container">
            <div class="viewer-card">
                <div class="viewer-controls">
                    <a href="#" id="directLink" target="_blank" class="btn btn-outline">
                        <i class="fas fa-external-link-alt"></i> Open in new tab
                    </a>
                    <button id="reloadBtn" class="btn btn-outline">
                        <i class="fas fa-sync-alt"></i> Reload
                    </button>
                </div>
                <div class="iframe-container">
                    <div class="iframe-loader" id="iframeLoader">
                        <div class="spinner"></div>
                        <span>Loading document...</span>
                    </div>
                    <iframe id="viewFrame" class="view-frame" src="about:blank" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="view-material.js"></script>
</body>
</html>
