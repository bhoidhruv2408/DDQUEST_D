<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>DDQuest · Student Management</title>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        /* ============================================
           view-students.css – 3D Space Theme
           ============================================ */
        :root {
            --primary: #4361ee;
            --primary-glow: rgba(67, 97, 238, 0.4);
            --secondary: #7209b7;
            --accent: #4cc9f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0b1120;
            --dark-card: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
            --border-light: rgba(255, 255, 255, 0.1);
            --radius-lg: 20px;
            --radius-md: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 24px;
            color: var(--light);
            perspective: 1200px;
            overflow-x: hidden;
            position: relative;
            background: #0a0c14;
        }

        /* 3D Space Canvas */
        #spaceCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
            position: relative;
            z-index: 10;
        }

        .header h1 {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            background: rgba(76,201,240,0.1);
            border-radius: var(--radius-md);
            transition: var(--transition);
            border: 1px solid transparent;
            backdrop-filter: blur(5px);
        }

        .back-link:hover {
            background: rgba(76,201,240,0.2);
            border-color: var(--accent);
            transform: translateX(-5px);
        }

        /* Search & Filter Bar */
        .search-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
            align-items: center;
            background: rgba(30,41,59,0.4);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .search-box {
            flex: 2;
            min-width: 250px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
        }

        .search-box input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            color: white;
            font-size: 1rem;
            transition: var(--transition);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .filter-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-select {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 12px 20px;
            color: white;
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-select:hover {
            border-color: var(--primary);
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .stats-badge {
            background: rgba(67,97,238,0.2);
            border: 1px solid var(--primary);
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Student Grid */
        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            margin-top: 24px;
            position: relative;
            z-index: 10;
        }

        /* 3D Card */
        .student-card {
            background: rgba(30,41,59,0.5);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 24px;
            transition: var(--transition);
            transform-style: preserve-3d;
            transform: translateZ(0) scale(1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5);
        }

        .student-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, var(--primary-glow), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .student-card:hover {
            transform: translateY(-10px) translateZ(20px) rotateX(2deg) rotateY(1deg);
            border-color: var(--primary);
            box-shadow: 0 30px 50px var(--primary-glow);
        }

        .student-card:hover::before {
            opacity: 0.3;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .student-card:hover .avatar {
            transform: scale(1.05) rotate(5deg);
        }

        .name-email {
            flex: 1;
        }

        .name-email h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .name-email p {
            font-size: 0.9rem;
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .online-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--gray);
            box-shadow: 0 0 8px currentColor;
            transition: background 0.3s ease;
        }

        .online-status.online {
            background: var(--success);
            box-shadow: 0 0 12px var(--success);
        }

        .online-status.away {
            background: var(--warning);
            box-shadow: 0 0 12px var(--warning);
        }

        .online-status.offline {
            background: var(--gray);
        }

        .card-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 20px 0;
            padding: 16px 0;
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-item i {
            color: var(--accent);
            font-size: 1.1rem;
            width: 24px;
        }

        .detail-item span {
            font-size: 0.9rem;
            color: var(--gray);
        }

        .detail-item strong {
            font-size: 1rem;
            font-weight: 600;
        }

        .last-active {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--gray);
        }

        .last-active i {
            color: var(--primary);
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 16px;
        }

        .btn-icon {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-light);
            color: var(--light);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .btn-icon:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: scale(1.1);
        }

        .btn-icon.view:hover {
            background: var(--success);
            border-color: var(--success);
        }

        /* Empty state */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px;
            color: var(--gray);
            background: rgba(30,41,59,0.4);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(5px);
        }

        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Loader */
        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .search-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-group {
                justify-content: space-between;
            }
            .student-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <canvas id="spaceCanvas"></canvas>

    <div class="header">
        <h1><i class="fas fa-users"></i> Student Management</h1>
        <a href="../dashboard/index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Dashboard
        </a>
    </div>

    <!-- Search & Filter Bar -->
    <div class="search-bar">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search by name or email...">
        </div>
        <div class="filter-group">
            <select class="filter-select" id="branchFilter">
                <option value="">All Branches</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Mechanical">Mechanical</option>
                <option value="Electrical">Electrical</option>
                <option value="Civil">Civil</option>
                <option value="Electronics">Electronics</option>
            </select>
            <select class="filter-select" id="semesterFilter">
                <option value="">All Semesters</option>
                <option value="1st">1st</option>
                <option value="2nd">2nd</option>
                <option value="3rd">3rd</option>
                <option value="4th">4th</option>
                <option value="5th">5th</option>
                <option value="6th">6th</option>
                <option value="7th">7th</option>
                <option value="8th">8th</option>
            </select>
            <select class="filter-select" id="statusFilter">
                <option value="">All Status</option>
                <option value="online">Online</option>
                <option value="away">Away</option>
                <option value="offline">Offline</option>
            </select>
            <div class="stats-badge">
                <i class="fas fa-user-graduate"></i>
                <span id="studentCount">0</span> students
            </div>
        </div>
    </div>

    <!-- Student Grid -->
    <div id="studentGrid" class="student-grid">
        <div class="loader"></div>
    </div>

    <script src="view-students.js"></script>
</body>
</html>
