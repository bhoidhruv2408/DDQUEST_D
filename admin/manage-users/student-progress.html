<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>DDQuest · Student Progress</title>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        /* ============================================
           student-progress.css – 3D Space Theme
           ============================================ */
        :root {
            --primary: #4361ee;
            --primary-glow: rgba(67, 97, 238, 0.4);
            --secondary: #7209b7;
            --accent: #4cc9f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0b1120;
            --dark-card: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
            --border-light: rgba(255, 255, 255, 0.1);
            --radius-lg: 20px;
            --radius-md: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 24px;
            color: var(--light);
            perspective: 1200px;
            overflow-x: hidden;
            position: relative;
            background: #0a0c14;
        }

        /* 3D Space Canvas */
        #spaceCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
            position: relative;
            z-index: 10;
        }

        .header h1 {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            background: rgba(76,201,240,0.1);
            border-radius: var(--radius-md);
            transition: var(--transition);
            border: 1px solid transparent;
            backdrop-filter: blur(5px);
        }

        .back-link:hover {
            background: rgba(76,201,240,0.2);
            border-color: var(--accent);
            transform: translateX(-5px);
        }

        /* Student Profile Card */
        .profile-card {
            background: rgba(30,41,59,0.5);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
            transition: var(--transition);
            transform-style: preserve-3d;
            transform: translateZ(0) scale(1);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5);
        }

        .profile-card:hover {
            transform: translateY(-5px) translateZ(20px);
            border-color: var(--primary);
            box-shadow: 0 30px 50px var(--primary-glow);
        }

        .avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .profile-info h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .profile-info p {
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .profile-info i {
            color: var(--accent);
            width: 20px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(30,41,59,0.5);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 20px;
            text-align: center;
            transition: var(--transition);
            transform-style: preserve-3d;
            transform: translateZ(0) scale(1);
        }

        .stat-card:hover {
            transform: translateY(-5px) translateZ(15px);
            border-color: var(--primary);
            box-shadow: 0 20px 30px var(--primary-glow);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Test Attempts Timeline */
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .section-title i {
            font-size: 2rem;
            color: var(--accent);
        }

        .section-title h3 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .attempts-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .attempt-card {
            background: rgba(30,41,59,0.4);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: var(--transition);
            transform-style: preserve-3d;
            transform: translateZ(0) scale(1);
        }

        .attempt-card:hover {
            transform: translateX(8px) translateZ(10px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px var(--primary-glow);
        }

        .attempt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .attempt-title {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .attempt-date {
            color: var(--gray);
            font-size: 0.9rem;
        }

        .attempt-score {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .score-badge {
            background: rgba(67,97,238,0.2);
            border: 1px solid var(--primary);
            border-radius: 40px;
            padding: 4px 16px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .score-progress {
            flex: 1;
            min-width: 200px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 4px;
            color: var(--gray);
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 10px;
            width: 0%;
            transition: width 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--gray);
            background: rgba(30,41,59,0.4);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(5px);
        }

        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Loader */
        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .profile-card {
                flex-direction: column;
                text-align: center;
            }
            .profile-info p {
                justify-content: center;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .attempt-header {
                flex-direction: column;
                gap: 8px;
                align-items: flex-start;
            }
            .attempt-score {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <canvas id="spaceCanvas"></canvas>

    <div class="header">
        <h1><i class="fas fa-chart-line"></i> Student Progress</h1>
        <a href="view-students.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Students
        </a>
    </div>

    <!-- Student Profile (filled by JS) -->
    <div id="profileContainer"></div>

    <!-- Stats Cards (filled by JS) -->
    <div id="statsContainer" class="stats-grid"></div>

    <!-- Test Attempts Timeline -->
    <div class="section-title">
        <i class="fas fa-history"></i>
        <h3>Test Attempts</h3>
    </div>
    <div id="attemptsContainer" class="attempts-list"></div>

    <!-- Loading state (initially shown) -->
    <div id="loading" class="loader"></div>

    <script src="student-progress.js"></script>
</body>
</html>
