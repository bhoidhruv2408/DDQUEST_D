<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>DDQuest • Upload Material</title>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <!-- Custom CSS (separate file) -->
    <link rel="stylesheet" href="upload-material.css">
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="glass-panel">
        <button class="theme-toggle" id="themeToggle" aria-pressed="false" title="Toggle theme">
            <i class="fas fa-moon"></i>
            <span id="themeLabel">Dark</span>
        </button>
        <a href="../dashboard/index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>

        <div class="header">
            <h1><i class="fas fa-cloud-upload-alt"></i> Add Material</h1>
            <p><i class="fas fa-shield-alt"></i> Admin only • Powered by Google Drive + Firestore</p>
        </div>

        <form id="uploadForm">
            <div class="form-grid">
                <!-- Title -->
                <div class="form-group full-width">
                    <label><i class="fas fa-heading"></i> Title <span class="required-star">*</span></label>
                    <input type="text" id="title" class="form-control" placeholder="e.g., Python Loops Notes" required>
                </div>

                <!-- Description -->
                <div class="form-group full-width">
                    <label><i class="fas fa-align-left"></i> Description</label>
                    <textarea id="description" class="form-control" placeholder="Brief description of the material..."></textarea>
                </div>

                <!-- Google Drive Link -->
                <div class="form-group full-width">
                    <label><i class="fab fa-google-drive"></i> Google Drive Link <span class="required-star">*</span></label>
                    <input type="url" id="driveLink" class="form-control" placeholder="https://drive.google.com/file/d/.../view" required>
                    <div class="field-hint">
                        <i class="fas fa-info-circle"></i> Paste the shareable link. It will be automatically converted to preview format.
                    </div>
                </div>

                <!-- AI Tag Suggestions -->
                <div class="form-group full-width" id="aiSuggestGroup">
                    <label><i class="fas fa-robot"></i> AI Tags (suggested)</label>
                    <div class="suggest-tags-wrapper">
                        <button type="button" id="suggestTagsBtn" class="btn-submit suggest-btn">Suggest Tags</button>
                        <div id="tagSuggestions" class="tag-suggestions"></div>
                    </div>
                    <input type="text" id="tagsInput" class="form-control" placeholder="Comma-separated tags (editable)" aria-label="Tags input">
                </div>

                <!-- Category -->
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Category <span class="required-star">*</span></label>
                    <select id="category" class="form-control" required>
                        <option value="" disabled selected>– Select –</option>
                        <option value="Notes">📘 Notes</option>
                        <option value="Question Bank">📝 Question Bank</option>
                        <option value="Lab Manual">🔬 Lab Manual</option>
                        <option value="Syllabus">📋 Syllabus</option>
                        <option value="Reference Book">📚 Reference Book</option>
                    </select>
                </div>

                <!-- Semester -->
                <div class="form-group">
                    <label><i class="fas fa-layer-group"></i> Semester <span class="required-star">*</span></label>
                    <select id="semester" class="form-control" required>
                        <option value="" disabled selected>– Select –</option>
                        <option value="1">1st Semester</option>
                        <option value="2">2nd Semester</option>
                        <option value="3">3rd Semester</option>
                        <option value="4">4th Semester</option>
                        <option value="5">5th Semester</option>
                        <option value="6">6th Semester</option>
                    </select>
                </div>

                <!-- Branch (optional) -->
                <div class="form-group full-width">
                    <label><i class="fas fa-code-branch"></i> Branch (optional)</label>
                    <select id="branch" class="form-control">
                        <option value="">All Branches</option>
                        <option value="Computer Science">💻 Computer Science</option>
                        <option value="Mechanical">⚙️ Mechanical</option>
                        <option value="Civil">🏗️ Civil</option>
                        <option value="Electronics">🔌 Electronics</option>
                        <option value="Electrical">⚡ Electrical</option>
                    </select>
                </div>
            </div>

            <!-- Submit button -->
            <button type="submit" class="btn-submit" id="submitBtn">
                <i class="fas fa-upload"></i> Add Material
            </button>
        </form>
    </div>

    <!-- JavaScript (separate file) -->
    <script src="upload-material.js"></script>
</body>
</html>
