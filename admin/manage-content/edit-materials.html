<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>DDQuest • Edit Materials</title>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="edit-materials.css">
</head>
<body>
    <!-- Flying particles canvas (animated background) -->
    <canvas id="particleCanvas" class="particle-canvas"></canvas>

    <div class="toast-container" id="toastContainer"></div>

    <div class="glass-panel">
        <div class="header">
            <h1><i class="fas fa-edit"></i> Manage Materials</h1>
            <div style="display: flex; gap: 12px;">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                    <span id="themeLabel">Dark</span>
                </button>
                <a href="../dashboard/index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> Dashboard
                </a>
            </div>
        </div>

        <!-- Search & Filter -->
        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="Search by title, description, tags...">
            <select class="filter-select" id="semesterFilter">
                <option value="">All Semesters</option>
                <option value="1">Semester 1</option>
                <option value="2">Semester 2</option>
                <option value="3">Semester 3</option>
                <option value="4">Semester 4</option>
                <option value="5">Semester 5</option>
                <option value="6">Semester 6</option>
            </select>
            <select class="filter-select" id="categoryFilter">
                <option value="">All Categories</option>
                <option value="Notes">📘 Notes</option>
                <option value="Question Bank">📝 Question Bank</option>
                <option value="Lab Manual">🔬 Lab Manual</option>
                <option value="Syllabus">📋 Syllabus</option>
                <option value="Reference Book">📚 Reference Book</option>
            </select>
        </div>

        <!-- Materials Grid -->
        <div id="materialsContainer">
            <div class="loader"></div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-card">
            <div class="modal-header">
                <h2><i class="fas fa-pen"></i> Edit Material</h2>
                <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" class="form-control" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea class="form-control" id="editDescription" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Google Drive Link</label>
                    <input type="url" class="form-control" id="editLink" placeholder="https://drive.google.com/file/d/.../preview">
                    <small class="field-hint">Paste the shareable link (will be converted automatically)</small>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select class="form-control" id="editCategory">
                        <option value="Notes">📘 Notes</option>
                        <option value="Question Bank">📝 Question Bank</option>
                        <option value="Lab Manual">🔬 Lab Manual</option>
                        <option value="Syllabus">📋 Syllabus</option>
                        <option value="Reference Book">📚 Reference Book</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Semester</label>
                    <select class="form-control" id="editSemester">
                        <option value="1">Semester 1</option>
                        <option value="2">Semester 2</option>
                        <option value="3">Semester 3</option>
                        <option value="4">Semester 4</option>
                        <option value="5">Semester 5</option>
                        <option value="6">Semester 6</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tags (comma separated)</label>
                    <input type="text" class="form-control" id="editTags" placeholder="e.g., python, loops">
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-save">Save Changes</button>
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- View Modal (with 3D flip) -->
    <div class="modal" id="viewModal">
        <div class="modal-card view-modal-card">
            <div class="view-modal-header">
                <h2 id="viewModalTitle"><i class="fas fa-eye"></i> View Material</h2>
                <div class="view-controls">
                    <button class="view-reload-btn" id="viewReloadBtn" title="Reload iframe"><i class="fas fa-sync-alt"></i></button>
                    <a href="#" id="viewDirectLink" target="_blank" class="view-direct-link" title="Open in new tab"><i class="fas fa-external-link-alt"></i></a>
                    <button class="close-btn" onclick="closeViewModal()"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div class="view-modal-body">
                <div class="iframe-loader" id="iframeLoader">
                    <div class="spinner"></div>
                    <span>Loading document...</span>
                </div>
                <iframe id="viewFrame" class="view-frame" src="about:blank" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="edit-materials.js"></script>
</body>
</html>
